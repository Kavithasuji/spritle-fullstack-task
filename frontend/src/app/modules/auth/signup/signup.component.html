<div class="auth-container">
  <div class="auth-card">

    <div class="logo-wrapper">
      <div class="chat-icon">💬</div>
      <h2 class="logo">SupportHub</h2>
    </div>

    <h4 class="title"> Create account</h4>
    <p class="subtitle">Every ticket tells a story — every customer deserves a connection</p>

    <div [hidden]="showOTP">

      <label>Name</label>
      <input type="text" [(ngModel)]="user.name" placeholder="Enter your name" />

      <label>Email address</label>
      <input type="email" [(ngModel)]="user.email" (input)="onEmailChange()" placeholder="you@company.com" />
      <p class="error" *ngIf="user.email && !isValidEmail(user.email)">
        Invalid email address
      </p>

      <p *ngIf="emailExists" class="error">
        User already exists.
        <a routerLink="/login">Log In</a>
      </p>

      <button type="button" [disabled]="!user.name || !user.email || !isValidEmail(user.email) || emailExists"
        (click)="signup()">
        Send OTP →
      </button>
    </div>

    <div [hidden]="!showOTP">

      <p class="otp-title">OTP sent to {{ user.email }}</p>

      <label>Enter OTP</label>

      <div class="otp-box">
        <input maxlength="1" [(ngModel)]="otp[0]" (input)="moveNext($event,1)">
        <input maxlength="1" [(ngModel)]="otp[1]" (input)="moveNext($event,2)">
        <input maxlength="1" [(ngModel)]="otp[2]" (input)="moveNext($event,3)">
        <input maxlength="1" [(ngModel)]="otp[3]" (input)="moveNext($event,4)">
        <input maxlength="1" [(ngModel)]="otp[4]" (input)="moveNext($event,5)">
        <input maxlength="1" [(ngModel)]="otp[5]">
      </div>

      <button type="button" [disabled]="isVerifying" (click)="verify()">
        {{ isVerifying ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <p class="back" (click)="goBack()">← Change Email</p>
    </div>

    <p class="footer">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>

  </div>
</div>
