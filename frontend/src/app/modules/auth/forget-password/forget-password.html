<div class="auth-container">
  <div class="auth-card">

    <h2 class="logo">SupportHub</h2>
    <p class="subtitle">Reset your password</p>

    <div *ngIf="step === 1">
      <label>Email</label>
      <input 
        type="email" 
        [(ngModel)]="email" 
        placeholder="Enter your email"
        [class.invalid]="email && !isValidEmail()"
      />

      <p *ngIf="email && !isValidEmail()" class="error">
        Enter valid email address
      </p>

      <button 
        [disabled]="!isValidEmail() || isSendingOtp"
        (click)="sendOtp()">
        {{ isSendingOtp ? 'Sending...' : 'Send OTP' }}
      </button>
    </div>

    <div *ngIf="step === 2">
      <p>OTP sent to {{ email }}</p>

      <div class="otp-box">
        <input maxlength="1" [(ngModel)]="otp[0]" (input)="moveNext($event,1)">
        <input maxlength="1" [(ngModel)]="otp[1]" (input)="moveNext($event,2)">
        <input maxlength="1" [(ngModel)]="otp[2]" (input)="moveNext($event,3)">
        <input maxlength="1" [(ngModel)]="otp[3]" (input)="moveNext($event,4)">
        <input maxlength="1" [(ngModel)]="otp[4]" (input)="moveNext($event,5)">
        <input maxlength="1" [(ngModel)]="otp[5]">
      </div>

      <button 
        [disabled]="isVerifyingOtp || otp.join('').length !== 6"
        (click)="verifyOtp()">
        {{ isVerifyingOtp ? 'Verifying...' : 'Verify OTP' }}
      </button>
    </div>

    <div *ngIf="step === 3">

      <label>New Password</label>

      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          placeholder="Enter new password"
        >

        <span class="eye" (click)="togglePassword()">
          {{ showPassword ? '👁️' : '🙈'}}
        </span>
      </div>

      <button
        [disabled]="!newPassword || isResetting"
        (click)="resetPassword()">
        {{ isResetting ? 'Updating...' : 'Update Password' }}
      </button>

    </div>

  </div>
</div>
